version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Copy runtime env vars into .env.production so the Next.js SSR runtime
        # can read them. Amplify console env vars are only available at build
        # time by default, not to server actions/SSR at request time.
        - env | grep -e RESEND_ -e DATABASE_URL -e AUTH_ >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
