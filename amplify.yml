version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Amplify console env vars aren't exposed to the SSR runtime, so copy the
        # runtime vars into .env.production at build.
        - node scripts/write-env-production.mjs
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
